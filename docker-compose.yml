# =============================================================================
# Trading Agent -- docker-compose for LOCAL development + CLOUD production
# =============================================================================
# Same file works in both contexts. On the cloud box, just `docker compose
# up -d` -- the volumes resolve to ./data, ./logs, ./models, ./config.yaml
# next to the compose file.
#
# Local: docker compose up                      (foreground, see logs)
# Cloud: docker compose up -d                   (detached, restart=unless-stopped)
# Logs:  docker compose logs -f trader
# Stop:  docker compose down
# =============================================================================
# (No `version:` field -- compose v2 deprecated it and reads the spec from
# the top-level keys directly.)

services:
  trader:
    image: trading-agent:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trader
    hostname: trader
    restart: unless-stopped

    environment:
      TZ: Asia/Kolkata
      PYTHONUNBUFFERED: "1"
      # Cloud default = SECURE. Set TRADER_DISABLE_SSL_VERIFY=true in .env
      # only if you're behind a corporate self-signed-cert proxy.
      TRADER_DISABLE_SSL_VERIFY: "${TRADER_DISABLE_SSL_VERIFY:-false}"

    env_file:
      - .env

    volumes:
      # Persist DB so a container restart never wipes trade history
      - ./data:/app/data
      # Logs accessible from host without exec'ing into the container
      - ./logs:/app/logs
      # Trained XGB model is gitignored; mount read-only from host
      - ./models:/app/models:ro
      # Config is host-managed so edits don't require a rebuild
      - ./config.yaml:/app/config.yaml:ro

    healthcheck:
      test: ["CMD", "python", "/app/tools/health_check.py",
             "--max-age-seconds", "600", "--quiet"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 180s

    # Override in docker-compose.override.yml or via `command:` env to switch
    # poll interval / disable market-hours-only / etc.
    command: ["python", "run_daemon.py", "--paper", "--interval", "60"]

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    # Resource caps (paper daemon measured at ~600MB; this is comfortable
    # headroom and prevents a runaway from OOM'ing the whole VM).
    deploy:
      resources:
        limits:
          memory: 1500M
        reservations:
          memory: 600M
